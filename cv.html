<!DOCTYPE html>
<html lang="en-US">
<head>
  <title>Yujing Huang — CV</title>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Curriculum Vitae — Yujing Huang, Economics PhD Candidate at UCLA Anderson">

  <!-- Stay indexable by search engines, but opt out of AI training/scraping -->
  <meta name="robots" content="index, follow, noai, noimageai">
  <meta name="googlebot" content="index, follow">

  <link rel="icon" href="./assets/img/photo.jpg" type="image/jpeg" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #525659;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Slim top bar with a link back to the homepage */
    .cv-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: #323639;
      color: #e8e8e8;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    .cv-bar a {
      color: #e8e8e8;
      text-decoration: none;
    }
    .cv-bar a:hover { text-decoration: underline; }
    .cv-bar .title { font-weight: 600; }

    /* The viewer fills the rest of the window */
    .cv-frame {
      width: 100%;
      height: calc(100% - 44px);
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="cv-bar">
    <span class="title">Yujing Huang — Curriculum Vitae</span>
    <a href="./index.html">&larr; Back to homepage</a>
  </div>

  <!--
    The CV is embedded for viewing only. The #toolbar=0 fragment hides the
    browser PDF viewer's download / print / save controls (Chrome, Edge).
    Right-click is disabled below. Note: no static web page can fully prevent
    a determined user from retrieving a file their browser has downloaded to
    display it — this removes the ordinary download affordances.
  -->
  <iframe
    class="cv-frame"
    src="./assets/cv.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH"
    title="Yujing Huang — Curriculum Vitae">
  </iframe>

  <script>
    // Disable right-click (context menu "Save as…") across the page.
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });
  </script>

</body>
</html>
